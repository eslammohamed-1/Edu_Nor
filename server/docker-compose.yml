services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: edunor
      POSTGRES_PASSWORD: edunor
      POSTGRES_DB: edunor
    ports:
      - '5432:5432'
    volumes:
      - edunor_pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - edunor_minio:/data

volumes:
  edunor_pgdata:
  edunor_minio:
