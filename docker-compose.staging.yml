services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-edunor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-edunor}
      POSTGRES_DB: ${POSTGRES_DB:-edunor}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - edunor_staging_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio12345}
    ports:
      - '${MINIO_PORT:-9000}:9000'
      - '${MINIO_CONSOLE_PORT:-9001}:9001'
    volumes:
      - edunor_staging_minio:/data

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-edunor}:${POSTGRES_PASSWORD:-edunor}@postgres:5432/${POSTGRES_DB:-edunor}
      JWT_SECRET: ${JWT_SECRET:-dev-only-change-to-long-random-string-in-production}
      CERTIFICATE_HMAC_SECRET: ${CERTIFICATE_HMAC_SECRET:-dev-only-change-to-long-random-string-in-production}
      JWT_ACCESS_EXPIRES_SEC: ${JWT_ACCESS_EXPIRES_SEC:-900}
      JWT_REFRESH_EXPIRES_DAYS: ${JWT_REFRESH_EXPIRES_DAYS:-7}
      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL:-superadmin@edunor.local}
      SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD:-EduNorSuper2026!}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      ENABLE_API_DOCS: ${ENABLE_API_DOCS:-true}
      APP_PUBLIC_URL: ${APP_PUBLIC_URL:-http://localhost:8080}
      SKIP_BREACH_CHECK: ${SKIP_BREACH_CHECK:-1}
      SEED_ON_START: ${SEED_ON_START:-true}
      CSV_DATA_DIR: ${CSV_DATA_DIR:-/repo/data/csv}
      QUESTION_BANK_ROOT: ${QUESTION_BANK_ROOT:-/repo/data/question-bank}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_BUCKET: ${S3_BUCKET:-edunor}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minio}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minio12345}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_USE_PATH_STYLE: ${S3_USE_PATH_STYLE:-true}
      PORT: 3001
    ports:
      - '${SERVER_PORT:-3001}:3001'

  app:
    build:
      context: .
      dockerfile: Dockerfile.app
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3001}
        VITE_BASE_PATH: ${VITE_BASE_PATH:-/}
    restart: unless-stopped
    depends_on:
      server:
        condition: service_started
    ports:
      - '${APP_PORT:-8080}:80'

volumes:
  edunor_staging_pgdata:
  edunor_staging_minio:
